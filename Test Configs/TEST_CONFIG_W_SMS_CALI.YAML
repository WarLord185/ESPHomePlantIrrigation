esphome:
  name: esphome-web-0d2fb0
  friendly_name: ESPHome Web 0d2fb0
  min_version: 2025.11.0
  name_add_mac_suffix: false
  on_boot:
    priority: 600
    then:
      - lambda: |-
          for (int i = 0; i < 128; i++) {
            id(temp_buf)[i] = NAN;
            id(hum_buf)[i]  = NAN;
            id(soil_buf)[i] = NAN;
          }

esp32:
  variant: esp32c6
  framework:
    type: esp-idf

logger:
api:
ota:
  - platform: esphome

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  manual_ip:
    static_ip: 10.1.1.39
    gateway: 10.1.1.1
    subnet: 255.255.255.0
  ap:
    ssid: "ESP32C6 FallBackHotSpot"
    password: "qwertyuiop"

captive_portal:

i2c:
  sda: 6
  scl: 7
  scan: true
  frequency: 100000Hz

globals:
  - id: display_mode
    type: int
    restore_value: no
    initial_value: '0'
  - id: temp_buf
    type: float[128]
    restore_value: no
  - id: hum_buf
    type: float[128]
    restore_value: no
  - id: soil_buf
    type: float[128]
    restore_value: no
  - id: buf_index
    type: int
    restore_value: no
    initial_value: '0'

output:
  - platform: ledc
    pin: 2
    id: humidity_pwm
    frequency: 1000Hz

  - platform: gpio
    pin: 18
    id: pump_led_output

  - platform: gpio
    pin: 12
    id: pump_output

switch:
  - platform: template
    name: "LED Bar Graph"
    id: led_bar_enabled
    optimistic: true
    restore_mode: RESTORE_DEFAULT_ON
    turn_on_action:
      then:
        - lambda: |-
            float h = id(room_humidity).state;
            if (isnan(h) || h < 0) h = 0;
            if (h > 100) h = 100;
            id(humidity_pwm).set_level(h / 100.0f);
    turn_off_action:
      then:
        - lambda: id(humidity_pwm).set_level(0.0f);

  - platform: template
    name: "Water Pump"
    id: pump_switch
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF
    turn_on_action:
      then:
        - output.turn_on: pump_output
        - output.turn_on: pump_led_output
    turn_off_action:
      then:
        - output.turn_off: pump_output
        - output.turn_off: pump_led_output

binary_sensor:
  - platform: gpio
    pin:
      number: 5
      mode: INPUT
    id: touch_button
    name: "Touch Button"
    device_class: power
    filters:
      - delayed_on: 10ms
    on_press:
      then:
        - switch.toggle: led_bar_enabled

  - platform: gpio
    pin:
      number: 11
      mode: INPUT
    id: display_cycle_button
    name: "Display Cycle Button"
    device_class: power
    filters:
      - delayed_on: 10ms
    on_press:
      then:
        - lambda: |-
            id(display_mode) = (id(display_mode) + 1) % 4;

  - platform: gpio
    pin:
      number: 19
      mode: INPUT
    id: pump_manual_button
    name: "Pump Manual Button"
    device_class: power
    filters:
      - delayed_on: 10ms
    on_press:
      then:
        - switch.toggle: pump_switch

sensor:
  # ── Template sensor to hold raw ADC voltage for calibration ──
  - platform: template
    name: "Soil Moisture Raw ADC"
    id: soil_moisture_raw
    unit_of_measurement: "V"
    accuracy_decimals: 4
    update_interval: never

  # ── Main soil moisture sensor (calibrated) ──
  - platform: adc
    pin: 1
    name: "Soil Moisture"
    id: soil_moisture
    unit_of_measurement: "%"
    device_class: moisture
    attenuation: 12db
    update_interval: 60s
    on_raw_value:
      then:
        - lambda: |-
            id(soil_moisture_raw).publish_state(x);
    filters:
      - calibrate_linear:
          - 2.6660 -> 0.0
          - 0.9730 -> 100.0
      - clamp:
          min_value: 0.0
          max_value: 100.0
    on_value:
      then:
        - lambda: |-
            id(soil_buf)[id(buf_index)] = x;
        - if:
            condition:
              lambda: 'return x <= 30.0 && !id(pump_switch).state;'
            then:
              - switch.turn_on: pump_switch
              - delay: 10s
              - switch.turn_off: pump_switch

  - platform: sht4x
    precision: High
    update_interval: 30s
    temperature:
      name: "Room Temperature"
      id: room_temp
      on_value:
        then:
          - lambda: |-
              id(temp_buf)[id(buf_index)] = x;
    humidity:
      name: "Room Humidity"
      id: room_humidity
      on_value:
        then:
          - lambda: |-
              id(hum_buf)[id(buf_index)] = x;
              id(buf_index) = (id(buf_index) + 1) % 128;
              if (!id(led_bar_enabled).state) return;
              float h = x;
              if (h < 0) h = 0;
              if (h > 100) h = 100;
              id(humidity_pwm).set_level(h / 100.0f);

font:
  - file: "gfonts://Roboto"
    id: font_small
    size: 10
  - file: "gfonts://Roboto"
    id: font_medium
    size: 16

display:
  - platform: ssd1306_i2c
    model: "SSD1306 128x64"
    address: 0x3C
    id: oled
    setup_priority: -100
    update_interval: 1s
    lambda: |-
      auto draw_graph = [&](float* buf, int cur_idx, float y_min, float y_max,
                            int gx, int gy, int gw, int gh) {
        it.line(gx, gy, gx, gy + gh);
        it.line(gx, gy + gh, gx + gw, gy + gh);
        float range = y_max - y_min;
        if (range == 0) range = 1;
        for (int i = 0; i < gw; i++) {
          int idx = (cur_idx + i) % 128;
          float v = buf[idx];
          if (isnan(v)) continue;
          float norm = (v - y_min) / range;
          if (norm < 0) norm = 0;
          if (norm > 1) norm = 1;
          int py = gy + gh - (int)(norm * gh);
          it.draw_pixel_at(gx + i, py);
        }
      };

      if (id(display_mode) == 0) {
        // ── Mode 0: Temperature graph ──
        it.printf(0, 0, id(font_small), "Temperature (C)");
        it.printf(80, 0, id(font_small), "%.1f C", id(room_temp).state);
        draw_graph(id(temp_buf), id(buf_index), 15.0, 40.0, 0, 12, 128, 50);

      } else if (id(display_mode) == 1) {
        // ── Mode 1: Humidity graph ──
        it.printf(0, 0, id(font_small), "Humidity (%%)");
        it.printf(85, 0, id(font_small), "%.1f%%", id(room_humidity).state);
        draw_graph(id(hum_buf), id(buf_index), 0.0, 100.0, 0, 12, 128, 50);

      } else if (id(display_mode) == 2) {
        // ── Mode 2: Soil moisture graph ──
        it.printf(0, 0, id(font_small), "Soil Moisture (%%)");
        it.printf(75, 0, id(font_small), "%.1f%%", id(soil_moisture).state);
        if (id(pump_switch).state) {
          it.printf(105, 0, id(font_small), "PMP");
        }
        draw_graph(id(soil_buf), id(buf_index), 0.0, 100.0, 0, 12, 128, 50);

      } else {
        // ── Mode 3: Current readings summary ──
        it.printf(0, 0,  id(font_small),  "Temperature");
        it.printf(65, 0, id(font_small),  "Humidity");
        it.line(0, 11, 128, 11);
        it.printf(0, 13, id(font_medium), "%.1fC", id(room_temp).state);
        it.printf(65, 13, id(font_medium), "%.0f%%", id(room_humidity).state);
        it.line(0, 32, 128, 32);
        it.printf(0, 34, id(font_small),  "Soil Moisture");
        it.printf(0, 45, id(font_medium), "%.1f%%", id(soil_moisture).state);
        if (id(pump_switch).state) {
          it.printf(80, 54, id(font_small), "PUMP ON");
        }
      }

button:
  - platform: template
    name: "Test LED Bar Graph"
    on_press:
      then:
        - script.execute: test_led_bar

  - platform: template
    name: "Soil Cal: Read Raw ADC"
    on_press:
      then:
        - script.execute: soil_calibrate_read

  - platform: template
    name: "Soil Cal: Save Dry Value"
    on_press:
      then:
        - script.execute: soil_calibrate_dry

  - platform: template
    name: "Soil Cal: Save Wet Value"
    on_press:
      then:
        - script.execute: soil_calibrate_wet

script:
  # ── Soil calibration: take 5 raw ADC readings ──
  - id: soil_calibrate_read
    mode: single
    then:
      - lambda: |-
          ESP_LOGI("soil_cal", "==============================");
          ESP_LOGI("soil_cal", " SOIL CALIBRATION - RAW READ");
          ESP_LOGI("soil_cal", "==============================");
          ESP_LOGI("soil_cal", "Taking 5 readings, 1s apart...");
      - repeat:
          count: 5
          then:
            - lambda: |-
                ESP_LOGI("soil_cal", "  Raw ADC: %.4f V  |  Mapped: %.1f%%",
                  id(soil_moisture_raw).state,
                  id(soil_moisture).state);
            - delay: 1s
      - lambda: |-
          ESP_LOGI("soil_cal", "------------------------------");
          ESP_LOGI("soil_cal", "INSTRUCTIONS:");
          ESP_LOGI("soil_cal", "  DRY:  Hold sensor in open air,");
          ESP_LOGI("soil_cal", "        press 'Soil Cal: Save Dry Value'.");
          ESP_LOGI("soil_cal", "  WET:  Submerge sensor in water,");
          ESP_LOGI("soil_cal", "        press 'Soil Cal: Save Wet Value'.");
          ESP_LOGI("soil_cal", "  Then update calibrate_linear with those V values.");
          ESP_LOGI("soil_cal", "==============================");

  # ── Soil calibration: log dry (0%%) reference ──
  - id: soil_calibrate_dry
    mode: single
    then:
      - lambda: |-
          ESP_LOGI("soil_cal", "==============================");
          ESP_LOGI("soil_cal", "DRY REFERENCE (sensor in air)");
          ESP_LOGI("soil_cal", "  Raw ADC: %.4f V", id(soil_moisture_raw).state);
          ESP_LOGI("soil_cal", "  Use this as the 0%% value in calibrate_linear:");
          ESP_LOGI("soil_cal", "    - %.4f -> 0.0", id(soil_moisture_raw).state);
          ESP_LOGI("soil_cal", "==============================");

  # ── Soil calibration: log wet (100%%) reference ──
  - id: soil_calibrate_wet
    mode: single
    then:
      - lambda: |-
          ESP_LOGI("soil_cal", "==============================");
          ESP_LOGI("soil_cal", "WET REFERENCE (sensor in water)");
          ESP_LOGI("soil_cal", "  Raw ADC: %.4f V", id(soil_moisture_raw).state);
          ESP_LOGI("soil_cal", "  Use this as the 100%% value in calibrate_linear:");
          ESP_LOGI("soil_cal", "    - %.4f -> 100.0", id(soil_moisture_raw).state);
          ESP_LOGI("soil_cal", "==============================");

  # ── LED bar graph test ──
  - id: test_led_bar
    mode: single
    then:
      - lambda: |-
          ESP_LOGI("test", "Starting LED bar graph test...");
      - lambda: id(humidity_pwm).set_level(0.0f);
      - delay: 500ms
      - lambda: id(humidity_pwm).set_level(0.1f);
      - delay: 500ms
      - lambda: id(humidity_pwm).set_level(0.2f);
      - delay: 500ms
      - lambda: id(humidity_pwm).set_level(0.3f);
      - delay: 500ms
      - lambda: id(humidity_pwm).set_level(0.4f);
      - delay: 500ms
      - lambda: id(humidity_pwm).set_level(0.5f);
      - delay: 500ms
      - lambda: id(humidity_pwm).set_level(0.6f);
      - delay: 500ms
      - lambda: id(humidity_pwm).set_level(0.7f);
      - delay: 500ms
      - lambda: id(humidity_pwm).set_level(0.8f);
      - delay: 500ms
      - lambda: id(humidity_pwm).set_level(0.9f);
      - delay: 500ms
      - lambda: id(humidity_pwm).set_level(1.0f);
      - delay: 500ms
      - lambda: id(humidity_pwm).set_level(0.9f);
      - delay: 500ms
      - lambda: id(humidity_pwm).set_level(0.8f);
      - delay: 500ms
      - lambda: id(humidity_pwm).set_level(0.7f);
      - delay: 500ms
      - lambda: id(humidity_pwm).set_level(0.6f);
      - delay: 500ms
      - lambda: id(humidity_pwm).set_level(0.5f);
      - delay: 500ms
      - lambda: id(humidity_pwm).set_level(0.4f);
      - delay: 500ms
      - lambda: id(humidity_pwm).set_level(0.3f);
      - delay: 500ms
      - lambda: id(humidity_pwm).set_level(0.2f);
      - delay: 500ms
      - lambda: id(humidity_pwm).set_level(0.1f);
      - delay: 500ms
      - lambda: id(humidity_pwm).set_level(0.0f);
      - delay: 500ms
      - lambda: |-
          if (id(led_bar_enabled).state) {
            float h = id(room_humidity).state;
            if (isnan(h) || h < 0) h = 0;
            if (h > 100) h = 100;
            id(humidity_pwm).set_level(h / 100.0f);
            ESP_LOGI("test", "Test complete. Restored to %.1f%%", h);
          } else {
            id(humidity_pwm).set_level(0.0f);
            ESP_LOGI("test", "Test complete. LED bar off (switch is off).");
          }