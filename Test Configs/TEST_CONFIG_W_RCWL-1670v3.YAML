esphome:
  name: esphome-web-0d2fb0
  friendly_name: ESPHome Web 0d2fb0
  min_version: 2025.11.0
  name_add_mac_suffix: false
  on_boot:
    - priority: 600
      then:
        - lambda: |-
            for (int i = 0; i < 128; i++) {
              id(temp_buf)[i]  = NAN;
              id(hum_buf)[i]   = NAN;
              id(soil_buf)[i]  = NAN;
              id(water_buf)[i] = NAN;
            }
    - priority: -100
      then:
        - delay: 3s
        - output.turn_off: pump_output
        - output.turn_off: pump_led_output

esp32:
  variant: esp32c6
  framework:
    type: esp-idf

logger:
api:
ota:
  - platform: esphome

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  manual_ip:
    static_ip: 10.1.1.39
    gateway: 10.1.1.1
    subnet: 255.255.255.0
  ap:
    ssid: "ESP32C6 FallBackHotSpot"
    password: "qwertyuiop"

captive_portal:

deep_sleep:
  id: deep_sleep_ctrl
  wakeup_pin:
    number: GPIO3
    inverted: true
    allow_other_uses: true
    mode:
      input: true
      pullup: true
  wakeup_pin_mode: KEEP_AWAKE

i2c:
  sda: 6
  scl: 7
  scan: true
  frequency: 100000Hz

globals:
  - id: display_mode
    type: int
    restore_value: no
    initial_value: '0'
  - id: temp_buf
    type: float[128]
    restore_value: no
  - id: hum_buf
    type: float[128]
    restore_value: no
  - id: soil_buf
    type: float[128]
    restore_value: no
  - id: water_buf
    type: float[128]
    restore_value: no
  - id: buf_index
    type: int
    restore_value: no
    initial_value: '0'
  - id: soil_accum
    type: float
    restore_value: no
    initial_value: '0.0'
  - id: water_accum
    type: float
    restore_value: no
    initial_value: '0.0'
  - id: soil_last
    type: float
    restore_value: no
    initial_value: 'NAN'
  - id: water_last
    type: float
    restore_value: no
    initial_value: 'NAN'
  # tank_height_cm: usable depth in cm (total tank depth minus 2 cm blind zone)
  - id: tank_height_cm
    type: float
    restore_value: no
    initial_value: '398.0'

output:
  - platform: ledc
    pin: 2
    id: humidity_pwm
    frequency: 1000Hz
  - platform: gpio
    pin: 18
    id: pump_led_output
  - platform: gpio
    pin: 12
    id: pump_output

switch:
  - platform: template
    name: "LED Bar Graph"
    id: led_bar_enabled
    optimistic: true
    restore_mode: RESTORE_DEFAULT_ON
    turn_on_action:
      then:
        - lambda: |-
            float w = id(water_last);
            if (isnan(w) || w < 0) w = 0;
            if (w > 100) w = 100;
            id(humidity_pwm).set_level(w / 100.0f);
    turn_off_action:
      then:
        - lambda: id(humidity_pwm).set_level(0.0f);
  - platform: template
    name: "Water Pump"
    id: pump_switch
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF
    turn_on_action:
      then:
        - output.turn_on: pump_output
        - output.turn_on: pump_led_output
    turn_off_action:
      then:
        - output.turn_off: pump_output
        - output.turn_off: pump_led_output

binary_sensor:
  - platform: gpio
    pin:
      number: 5
      mode: INPUT
    id: touch_button
    name: "Touch Button"
    device_class: power
    filters:
      - delayed_on: 10ms
    on_press:
      then:
        - switch.toggle: led_bar_enabled
  - platform: gpio
    pin:
      number: 11
      mode: INPUT
    id: display_cycle_button
    name: "Display Cycle Button"
    device_class: power
    filters:
      - delayed_on: 10ms
    on_press:
      then:
        - lambda: |-
            id(display_mode) = (id(display_mode) + 1) % 5;
  - platform: gpio
    pin:
      number: 19
      mode: INPUT
    id: pump_manual_button
    name: "Pump Manual Button"
    device_class: power
    filters:
      - delayed_on: 10ms
    on_press:
      then:
        - switch.toggle: pump_switch
  - platform: gpio
    pin:
      number: GPIO3
      mode:
        input: true
        pullup: true
      inverted: true
      allow_other_uses: true
    id: sleep_button
    name: "Sleep Button"
    device_class: power
    filters:
      - delayed_on: 50ms
    on_press:
      then:
        - logger.log: "Sleep button pressed — entering deep sleep"
        - deep_sleep.enter: deep_sleep_ctrl

sensor:
  - platform: template
    name: "Soil Moisture Raw ADC"
    id: soil_moisture_raw
    unit_of_measurement: "V"
    accuracy_decimals: 4
    update_interval: never
  - platform: adc
    pin: 1
    name: "Soil Moisture ADC Internal"
    id: soil_moisture_adc
    unit_of_measurement: "%"
    device_class: moisture
    attenuation: 12db
    update_interval: never
    internal: true
    filters:
      - calibrate_linear:
          - 2.5820 -> 0.0
          - 0.8960 -> 100.0
      - clamp:
          min_value: 0.0
          max_value: 100.0
  - platform: template
    name: "Soil Moisture"
    id: soil_moisture
    unit_of_measurement: "%"
    device_class: moisture
    accuracy_decimals: 1
    update_interval: never
    on_value:
      then:
        - lambda: |-
            id(soil_last) = x;
            id(soil_buf)[id(buf_index)] = x;
        - if:
            condition:
              lambda: 'return x <= 30.0 && !id(pump_switch).state;'
            then:
              - switch.turn_on: pump_switch
              - delay: 10s
              - switch.turn_off: pump_switch
  - platform: sht4x
    precision: High
    update_interval: 30s
    temperature:
      name: "Room Temperature"
      id: room_temp
      on_value:
        then:
          - lambda: |-
              id(temp_buf)[id(buf_index)] = x;
    humidity:
      name: "Room Humidity"
      id: room_humidity
      on_value:
        then:
          - lambda: |-
              id(hum_buf)[id(buf_index)] = x;
              id(buf_index) = (id(buf_index) + 1) % 128;

  # ── RCWL-1670 water tank level sensor (GPIO trigger/echo mode) ──
  # GPIO0 = Trig → sensor RX pin
  # GPIO4 = Echo ← sensor TX pin (via level shifter)
  - platform: ultrasonic
    trigger_pin: 0
    echo_pin: 4
    name: "Water Tank Distance"
    id: water_distance
    internal: true
    update_interval: never
    pulse_time: 10us
    timeout: 4m

  - platform: template
    name: "Water Tank Level"
    id: water_level
    unit_of_measurement: "%"
    accuracy_decimals: 1
    icon: "mdi:water-percent"
    update_interval: never
    on_value:
      then:
        - lambda: |-
            id(water_last) = x;
            id(water_buf)[id(buf_index)] = x;
            if (!id(led_bar_enabled).state) return;
            float w = x;
            if (w < 0) w = 0;
            if (w > 100) w = 100;
            id(humidity_pwm).set_level(w / 100.0f);

font:
  - file: "gfonts://Roboto"
    id: font_small
    size: 10
  - file: "gfonts://Roboto"
    id: font_medium
    size: 16

display:
  - platform: ssd1306_i2c
    model: "SSD1306 128x64"
    address: 0x3C
    id: oled
    setup_priority: -100
    update_interval: 1s
    lambda: |-
      auto draw_graph = [&](float* buf, int cur_idx, float y_min, float y_max,
                            int gx, int gy, int gw, int gh) {
        it.line(gx, gy, gx, gy + gh);
        it.line(gx, gy + gh, gx + gw, gy + gh);
        float range = y_max - y_min;
        if (range == 0) range = 1;
        for (int i = 0; i < gw; i++) {
          int idx = (cur_idx + i) % 128;
          float v = buf[idx];
          if (isnan(v)) continue;
          float norm = (v - y_min) / range;
          if (norm < 0) norm = 0;
          if (norm > 1) norm = 1;
          int py = gy + gh - (int)(norm * gh);
          it.draw_pixel_at(gx + i, py);
        }
      };

      if (id(display_mode) == 0) {
        // ── Mode 0: Temperature graph ──
        it.printf(0, 0, id(font_small), "Temperature (C)");
        it.printf(80, 0, id(font_small), "%.1f C", id(room_temp).state);
        draw_graph(id(temp_buf), id(buf_index), 15.0, 40.0, 0, 12, 128, 50);
      } else if (id(display_mode) == 1) {
        // ── Mode 1: Humidity graph ──
        it.printf(0, 0, id(font_small), "Humidity (%%)");
        it.printf(85, 0, id(font_small), "%.1f%%", id(room_humidity).state);
        draw_graph(id(hum_buf), id(buf_index), 0.0, 100.0, 0, 12, 128, 50);
      } else if (id(display_mode) == 2) {
        // ── Mode 2: Soil moisture graph ──
        it.printf(0, 0, id(font_small), "Soil Moisture (%%)");
        if (isnan(id(soil_last))) {
          it.printf(75, 0, id(font_small), "-.-%% ");
        } else {
          it.printf(75, 0, id(font_small), "%.1f%%", id(soil_last));
        }
        draw_graph(id(soil_buf), id(buf_index), 0.0, 100.0, 0, 12, 128, 50);
      } else if (id(display_mode) == 3) {
        // ── Mode 3: Water tank level graph ──
        it.printf(0, 0, id(font_small), "Water Tank (%%)");
        if (isnan(id(water_last))) {
          it.printf(80, 0, id(font_small), "-.-%% ");
        } else {
          it.printf(80, 0, id(font_small), "%.1f%%", id(water_last));
        }
        draw_graph(id(water_buf), id(buf_index), 0.0, 100.0, 0, 12, 128, 50);
      } else {
        // ── Mode 4: Summary — 2×2 grid ──
        it.printf(0,  0,  id(font_small),  "Temperature");
        it.printf(65, 0,  id(font_small),  "Humidity");
        it.line(0, 11, 128, 11);
        it.printf(0,  13, id(font_medium), "%.1fC",  id(room_temp).state);
        it.printf(65, 13, id(font_medium), "%.0f%%", id(room_humidity).state);
        it.printf(0,  34, id(font_small),  "Soil Moisture");
        it.printf(65, 34, id(font_small),  "Water Tank");
        it.line(0, 45, 128, 45);
        if (isnan(id(soil_last))) {
          it.printf(0,  46, id(font_medium), "-.-%%");
        } else {
          it.printf(0,  46, id(font_medium), "%.1f%%", id(soil_last));
        }
        if (isnan(id(water_last))) {
          it.printf(65, 46, id(font_medium), "-.-%%");
        } else {
          it.printf(65, 46, id(font_medium), "%.1f%%", id(water_last));
        }
      }

interval:
  - interval: 45s
    then:
      - script.execute: soil_sample_avg
      - script.execute: water_sample_avg

button:
  - platform: template
    name: "Test LED Bar Graph"
    on_press:
      then:
        - script.execute: test_led_bar
  - platform: template
    name: "Soil Cal: Read Raw ADC"
    on_press:
      then:
        - script.execute: soil_calibrate_read
  - platform: template
    name: "Soil Cal: Save Dry Value"
    on_press:
      then:
        - script.execute: soil_calibrate_dry
  - platform: template
    name: "Soil Cal: Save Wet Value"
    on_press:
      then:
        - script.execute: soil_calibrate_wet

script:
  - id: soil_sample_avg
    mode: single
    then:
      - lambda: id(soil_accum) = 0.0;
      - repeat:
          count: 5
          then:
            - component.update: soil_moisture_adc
            - lambda: |-
                id(soil_moisture_raw).publish_state(id(soil_moisture_adc).raw_state);
                id(soil_accum) += id(soil_moisture_adc).state;
            - delay: 200ms
      - lambda: |-
          float avg = id(soil_accum) / 5.0f;
          if (avg < 0) avg = 0;
          if (avg > 100) avg = 100;
          id(soil_moisture).publish_state(avg);
  - id: water_sample_avg
    mode: single
    then:
      - lambda: id(water_accum) = 0.0;
      - repeat:
          count: 3
          then:
            - component.update: water_distance
            - lambda: |-
                float d = id(water_distance).state;
                if (!isnan(d)) id(water_accum) += d;
            - delay: 500ms
      - lambda: |-
          float avg = id(water_accum) / 3.0f;
          if (isnan(avg)) return;
          const float full_m  = 0.02f;
          const float empty_m = id(tank_height_cm) / 100.0f + 0.02f;
          float pct = ((100.0f) / (full_m - empty_m)) * avg
                    + (100.0f - (((100.0f) / (full_m - empty_m)) * full_m));
          if (pct < 0)   pct = 0;
          if (pct > 100) pct = 100;
          id(water_level).publish_state(pct);
  - id: soil_calibrate_read
    mode: single
    then:
      - lambda: |-
          ESP_LOGI("soil_cal", "==============================");
          ESP_LOGI("soil_cal", " SOIL CALIBRATION - RAW READ");
          ESP_LOGI("soil_cal", "==============================");
          ESP_LOGI("soil_cal", "Taking 5 readings, 1s apart...");
      - repeat:
          count: 5
          then:
            - component.update: soil_moisture_adc
            - lambda: |-
                ESP_LOGI("soil_cal", "  Raw ADC: %.4f V  |  Mapped: %.1f%%",
                  id(soil_moisture_raw).state,
                  id(soil_moisture_adc).state);
            - delay: 1s
      - lambda: |-
          ESP_LOGI("soil_cal", "------------------------------");
          ESP_LOGI("soil_cal", "INSTRUCTIONS:");
          ESP_LOGI("soil_cal", "  DRY:  Hold sensor in open air,");
          ESP_LOGI("soil_cal", "        press 'Soil Cal: Save Dry Value'.");
          ESP_LOGI("soil_cal", "  WET:  Submerge sensor in water,");
          ESP_LOGI("soil_cal", "        press 'Soil Cal: Save Wet Value'.");
          ESP_LOGI("soil_cal", "  Then update calibrate_linear with those V values.");
          ESP_LOGI("soil_cal", "==============================");
  - id: soil_calibrate_dry
    mode: single
    then:
      - lambda: |-
          ESP_LOGI("soil_cal", "==============================");
          ESP_LOGI("soil_cal", "DRY REFERENCE (sensor in air)");
          ESP_LOGI("soil_cal", "  Raw ADC: %.4f V", id(soil_moisture_raw).state);
          ESP_LOGI("soil_cal", "  Use this as the 0%% value in calibrate_linear:");
          ESP_LOGI("soil_cal", "    - %.4f -> 0.0", id(soil_moisture_raw).state);
          ESP_LOGI("soil_cal", "==============================");
  - id: soil_calibrate_wet
    mode: single
    then:
      - lambda: |-
          ESP_LOGI("soil_cal", "==============================");
          ESP_LOGI("soil_cal", "WET REFERENCE (sensor in water)");
          ESP_LOGI("soil_cal", "  Raw ADC: %.4f V", id(soil_moisture_raw).state);
          ESP_LOGI("soil_cal", "  Use this as the 100%% value in calibrate_linear:");
          ESP_LOGI("soil_cal", "    - %.4f -> 100.0", id(soil_moisture_raw).state);
          ESP_LOGI("soil_cal", "==============================");
  - id: test_led_bar
    mode: single
    then:
      - lambda: |-
          ESP_LOGI("test", "Starting LED bar graph test...");
      - lambda: id(humidity_pwm).set_level(0.0f);
      - delay: 500ms
      - lambda: id(humidity_pwm).set_level(0.1f);
      - delay: 500ms
      - lambda: id(humidity_pwm).set_level(0.2f);
      - delay: 500ms
      - lambda: id(humidity_pwm).set_level(0.3f);
      - delay: 500ms
      - lambda: id(humidity_pwm).set_level(0.4f);
      - delay: 500ms
      - lambda: id(humidity_pwm).set_level(0.5f);
      - delay: 500ms
      - lambda: id(humidity_pwm).set_level(0.6f);
      - delay: 500ms
      - lambda: id(humidity_pwm).set_level(0.7f);
      - delay: 500ms
      - lambda: id(humidity_pwm).set_level(0.8f);
      - delay: 500ms
      - lambda: id(humidity_pwm).set_level(0.9f);
      - delay: 500ms
      - lambda: id(humidity_pwm).set_level(1.0f);
      - delay: 500ms
      - lambda: id(humidity_pwm).set_level(0.9f);
      - delay: 500ms
      - lambda: id(humidity_pwm).set_level(0.8f);
      - delay: 500ms
      - lambda: id(humidity_pwm).set_level(0.7f);
      - delay: 500ms
      - lambda: id(humidity_pwm).set_level(0.6f);
      - delay: 500ms
      - lambda: id(humidity_pwm).set_level(0.5f);
      - delay: 500ms
      - lambda: id(humidity_pwm).set_level(0.4f);
      - delay: 500ms
      - lambda: id(humidity_pwm).set_level(0.3f);
      - delay: 500ms
      - lambda: id(humidity_pwm).set_level(0.2f);
      - delay: 500ms
      - lambda: id(humidity_pwm).set_level(0.1f);
      - delay: 500ms
      - lambda: id(humidity_pwm).set_level(0.0f);
      - delay: 500ms
      - lambda: |-
          if (id(led_bar_enabled).state) {
            float w = id(water_last);
            if (isnan(w) || w < 0) w = 0;
            if (w > 100) w = 100;
            id(humidity_pwm).set_level(w / 100.0f);
            ESP_LOGI("test", "Test complete. Restored to %.1f%%", w);
          } else {
            id(humidity_pwm).set_level(0.0f);
            ESP_LOGI("test", "Test complete. LED bar off (switch is off).");
          }